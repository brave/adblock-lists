name: Query Filter Validation

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    # Weekly run catches overlap introduced by upstream brave-core changes.
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  query-filter-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c # v6.0.0
        with:
          python-version: "3.13"

      - name: Validate query-filter.json against kConditionalQueryStringTrackers
        run: python3 tools/validate_query_filter.py
